    <!-- Javascript -->

    <script src="work.js"></script>

    <script>
      // Nav Content

      document.addEventListener("DOMContentLoaded", () => {
          const revealerNav = window.revealer({
              revealElementSelector: ".nav-js",
              options: {
                  anchorSelector: ".nav-btn-js",
              },
          });

          const actionBtn = document.querySelector(".nav-btn-js");
          actionBtn.addEventListener("click", () => {
              if (!revealerNav.isRevealed()) {
                  revealerNav.reveal();
                  actionBtn.setAttribute("data-open", true);
              } else {
                  revealerNav.hide();
                  actionBtn.setAttribute("data-open", false);
              }
          });
      });

      // Hide Content

      function myFunction() {
        var elementTwo = document.getElementById("hide-this-two");
        elementTwo.classList.toggle("hide-content-two");
        
        var elementTwo = document.getElementById("hide-this-two");
        elementTwo.classList.toggle("hide-content-two");

        var elementThree = document.getElementById("hide-this-three");
        elementThree.classList.toggle("hide-content-three");

        var elementFour = document.getElementById("hide-this-four");
        elementFour.classList.toggle("hide-content-four");
        
        var elementFive = document.getElementById("hide-this-five");
        elementFive.classList.toggle("hide-content-five");
      }

      // Folio Script

      let Size = 0.001;
      

            function increaseSize(value) {

                var elem = document.getElementById("distort-text");
                var text = new Blotter.Text("PAIFOLIO", {
                    family: "Trud Type",
                    weight: 100,
                    size: 150,
                    fill: "#c6e421"
                });

                text.needsUpdate = true;
                var material = new Blotter.RollingDistortMaterial();

                material.uniforms.uSineDistortAmplitude.value = 0.04;

                var blotter = new Blotter(material, {
                    texts: text
                });

                var scope = blotter.forText(text);

                scope.appendTo(elem);

                Size += 0.001;
                
            }
            
            
            increaseSize();
    </script>
