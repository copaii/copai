    <script>
      // Nav Content

      document.addEventListener("DOMContentLoaded", () => {
          const revealerNav = window.revealer({
              revealElementSelector: ".nav-js",
              options: {
                  anchorSelector: ".nav-btn-js",
              },
          });

          const actionBtn = document.querySelector(".nav-btn-js");
          actionBtn.addEventListener("click", () => {
              if (!revealerNav.isRevealed()) {
                  revealerNav.reveal();
                  actionBtn.setAttribute("data-open", true);
              } else {
                  revealerNav.hide();
                  actionBtn.setAttribute("data-open", false);
              }
          });
      });

      // Hide Content

      function myFunction() {
        
        var elementOne = document.getElementById("hide-this-one");
        elementOne.classList.toggle("hide-content-one");

        var elementTwo = document.getElementById("hide-this-two");
        elementTwo.classList.toggle("hide-content-two");

        var elementThree = document.getElementById("hide-this-three");
        elementThree.classList.toggle("hide-content-three");

        var elementFour = document.getElementById("hide-this-four");
        elementFour.classList.toggle("hide-content-four");

        var elementFive = document.getElementById("hide-this-five");
        elementFive.classList.toggle("hide-content-five");

        var elementFive = document.getElementById("change-this");
        elementFive.classList.toggle("change-height");
      }

      // Folio Script

      let Size = 0.001;
      

            function increaseSize(value) {

                var elem = document.getElementById("distort-text");
                var text = new Blotter.Text("PAIFOLIO", {
                    family: "Trud Type ",
                    weight: 100,
                    size: 150,
                    fill: "#c6e421"
                });

                text.needsUpdate = true;
                var material = new Blotter.RollingDistortMaterial();

                material.uniforms.uSineDistortAmplitude.value = 0.04;

                var blotter = new Blotter(material, {
                    texts: text
                });

                var scope = blotter.forText(text);

                scope.appendTo(elem);

                Size += 0.001;
                
            }
            
            
            increaseSize();

            // Progress
            window.onload = init;

            var progressBar;

            function init() {
              progressBar = document.querySelector(".sp-progress div");

              window.addEventListener("scroll", function() {
                  var max = document.body.scrollHeight - window.innerHeight;
                  var percent = (window.pageYOffset / max) * 50;
                  progressBar.style.width = percent + "%";
              });
            }    

            // Progress Onw

            (function(){
              "use strict"
              
              const progress = document.querySelector('.sp-progress');
              const container = document.querySelector('.sp-container');
              const docHeight = document.body.scrollHeight - window.innerHeight;
              window.addEventListener('scroll', setScrollPerc);
              
              function setScrollPerc() {
                let top = window.pageYOffset || document.documentElement.scrollTop;
                let perc = Math.ceil(top*100/docHeight);
                container.setAttribute('data-scroll', perc);
                progress.style.strokeDashoffset = 264 - (perc/100*264);
              }
            })()
    </script>
